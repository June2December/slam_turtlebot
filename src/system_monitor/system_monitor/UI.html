<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방공 로키</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .hidden { display: none !important; }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border: 1px solid #d8e2ef;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-sub {
      text-align: center;
      color: #64748b;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    .input-box {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d8e2ef;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: #f8fbff;
    }

    .login-btn {
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .login-error {
      margin-top: 14px;
      color: #dc2626;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .dashboard-shell {
      background: #eef3f9;
      border: 1px solid #d9e3f0;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .top-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-btn {
      border: 1px solid #cfd8e3;
      background: #ffffff;
      color: #334155;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .top-bar {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: center;
      margin-bottom: 20px;
    }

    .site-title {
      background: linear-gradient(135deg, #ff6b57 0%, #ff7f50 100%);
      color: #ffffff;
      padding: 22px 18px;
      border-radius: 22px;
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 24px rgba(255, 107, 87, 0.25);
    }

    .top-info-card {
      background: #ffffff;
      border: 1px solid #dbe5f0;
      border-radius: 22px;
      padding: 20px 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .battery-title {
      font-size: 16px;
      font-weight: 700;
      color: #475569;
    }

    .battery-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f8fbff;
      border: 1px solid #d8e5f3;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      color: #1e293b;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.15fr 1.15fr 0.78fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1.5fr 0.8fr 0.7fr;
      gap: 18px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe5f0;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 14px;
    }

    .viewer-box {
      position: relative;
      width: 100%;
      height: 290px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
      border: 1px solid #dbe5f0;
      overflow: hidden;
    }

    .viewer-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .webcam-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-weight: 700;
      font-size: 16px;
      background: transparent;
    }

    .bbox {
      position: absolute;
      border: 3px solid #ff5a5a;
      border-radius: 10px;
      width: 92px;
      height: 64px;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(255, 90, 90, 0.12);
      display: none;
    }

    .bbox-label {
      position: absolute;
      left: 50%;
      top: calc(48% - 46px);
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.88);
      color: #ffffff;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 10px;
      white-space: nowrap;
      display: none;
    }

    .map-canvas {
      position: relative;
      width: 100%;
      height: 290px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
      border: 1px solid #dbe5f0;
      overflow: hidden;
    }

    .map-path {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .map-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
      pointer-events: none;
    }

    .map-point {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .air-point {
      background: rgba(239, 68, 68, 0.78);
    }

    .drop-point {
      background: rgba(59, 130, 246, 0.92);
      width: 14px;
      height: 14px;
      box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.18);
    }

    .map-label {
      position: absolute;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      color: white;
      font-size: 12px;
      font-weight: 700;
      z-index: 4;
      transform: translate(-50%, -140%);
    }

    .control-card {
      display: flex;
      flex-direction: column;
    }

    .robot-select {
      width: 100%;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 16px;
      border: 1px solid #d7e3ef;
      background: #f8fbff;
      color: #1e293b;
      margin-bottom: 22px;
      outline: none;
    }

    .teleop-wrap {
      display: grid;
      grid-template-columns: 72px 72px 72px;
      grid-template-rows: 72px 72px 72px;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .ctrl-btn {
      border: 1px solid #d7e3ef;
      background: #ffffff;
      border-radius: 18px;
      font-size: 28px;
      font-weight: 700;
      color: #334155;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }

    .ctrl-up    { grid-column: 2; grid-row: 1; }
    .ctrl-left  { grid-column: 1; grid-row: 2; }
    .ctrl-stop  { grid-column: 2; grid-row: 2; }
    .ctrl-right { grid-column: 3; grid-row: 2; }
    .ctrl-down  { grid-column: 2; grid-row: 3; }

    .home-btn {
      margin-top: 18px;
      border: none;
      background: linear-gradient(135deg, #64748b 0%, #7b8797 100%);
      color: white;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .start-btn {
      margin-top: 18px;
      border: none;
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: white;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(16, 185, 129, 0.22);
    }

    .robot-status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #dbe5f0;
      font-size: 14px;
      line-height: 1.7;
      color: #475569;
    }

    .map-status-box {
      margin-top: 16px;
    }

    .log-title {
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .log-box {
      height: 150px;
      overflow-y: auto;
      background: linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
      border: 1px solid #dbe5f0;
      border-radius: 18px;
      padding: 14px;
      color: #334155;
      font-size: 14px;
      line-height: 1.6;
    }

    .siren-card {
      min-height: 232px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .siren-box {
      width: 128px;
      height: 128px;
      margin-top: 2px;
      border-radius: 28px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
      border: 1px solid #dbe5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 62px;
      transition: all 0.2s ease;
    }

    .siren-box.active {
      background: radial-gradient(circle at center, rgba(255, 99, 99, 0.22), rgba(255, 99, 99, 0.08));
      border-color: rgba(255, 90, 90, 0.55);
      box-shadow:
        0 0 14px rgba(255, 0, 0, 0.35),
        0 0 28px rgba(255, 0, 0, 0.28),
        0 0 48px rgba(255, 0, 0, 0.18);
      animation: sirenBlink 0.42s infinite alternate;
    }

    @keyframes sirenBlink {
      from { transform: scale(1); opacity: 0.75; }
      to { transform: scale(1.07); opacity: 1; }
    }

    .siren-text {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
    }

    .status-line {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
    }

    .stop-btn {
      width: 170px;
      border: none;
      background: linear-gradient(135deg, #ff6b57 0%, #ff845f 100%);
      color: #ffffff;
      padding: 15px 18px;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(255, 107, 87, 0.24);
    }

    .user-card {
      min-height: 232px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .user-name {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 26px;
    }

    .logout-btn {
      border: none;
      background: linear-gradient(135deg, #4ea7ff 0%, #67b5ff 100%);
      color: #ffffff;
      padding: 14px 26px;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(78, 167, 255, 0.24);
    }

    @media (max-width: 1100px) {
      .main-grid,
      .bottom-grid,
      .top-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-page">
    <div class="login-card">
      <div class="login-title">방공 로키</div>
      <div class="login-sub">AMR 통합 관제 시스템 로그인</div>

      <div class="input-group">
        <label class="input-label" for="userId">아이디</label>
        <input id="userId" class="input-box" type="text" placeholder="아이디 입력" />
      </div>

      <div class="input-group">
        <label class="input-label" for="password">비밀번호</label>
        <input id="password" class="input-box" type="password" placeholder="비밀번호 입력" />
      </div>

      <button class="login-btn" onclick="login()">로그인</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <div id="dashboardScreen" class="page hidden">
    <div class="dashboard-shell">
      <div class="top-tabs">
        <button class="tab-btn" onclick="goDashboard()">실시간 확인</button>
        <button class="tab-btn" onclick="goLogs()">전체 Log</button>
      </div>

      <div class="top-bar">
        <div class="site-title">방공 로키</div>
        <div class="top-info-card">
          <div class="battery-title">배터리 잔량</div>
          <div class="battery-chip" id="battery1">AMR_1 90%</div>
          <div class="battery-chip" id="battery2">AMR_2 70%</div>
        </div>
      </div>

      <div class="main-grid">
        <div class="card">
          <div class="card-title">Webcam</div>
          <div class="viewer-box">
            <img id="webcamImage" src="" alt="webcam" />
            <div id="webcamEmpty" class="webcam-empty">탐지 이미지 대기 중</div>
            <div class="bbox-label" id="bboxLabel">Enemy Detected</div>
            <div class="bbox" id="bbox"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Map</div>
          <div class="map-canvas" id="mapCanvas">
            <img id="mapImage" class="map-image" src="/map_image" alt="map" />
            <svg id="mapPath" class="map-path"></svg>
            <div id="mapOverlay" class="map-overlay"></div>
          </div>

          <div class="robot-status map-status-box" id="robotStatusBox">
            <div>AMR_1 상태 : Idle</div>
            <div>AMR_2 상태 : Idle</div>
          </div>
        </div>

        <div class="card control-card">
          <div class="card-title">수동 조작</div>

          <select id="robotSelect" class="robot-select">
            <option value="amr1">AMR_1</option>
            <option value="amr2">AMR_2</option>
          </select>

          <div class="teleop-wrap">
            <button class="ctrl-btn ctrl-up" onclick="sendTeleop('forward')">△</button>
            <button class="ctrl-btn ctrl-left" onclick="sendTeleop('left')">◁</button>
            <button class="ctrl-btn ctrl-stop" onclick="sendTeleop('stop')">▢</button>
            <button class="ctrl-btn ctrl-right" onclick="sendTeleop('right')">▷</button>
            <button class="ctrl-btn ctrl-down" onclick="sendTeleop('backward')">▽</button>
          </div>

          <button class="start-btn" onclick="sendStart()">START</button>
          <button class="home-btn" onclick="sendHome()">HOME 복귀</button>
        </div>
      </div>

      <div class="bottom-grid">
        <div class="card">
          <div class="log-title">Log</div>
          <div class="log-box" id="logBox"></div>
        </div>

        <div class="card siren-card">
          <div>
            <div id="sirenBox" class="siren-box">🚨</div>
            <div class="siren-text" id="sirenText">사이렌 OFF</div>
            <div class="status-line" id="alertText">정상 상태</div>
          </div>
          <button class="stop-btn" onclick="stopAlert()">STOP</button>
        </div>

        <div class="card user-card">
          <div class="user-name" id="usernameBox">사용자 : -</div>
          <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let latestState = null;
    let refreshTimer = null;
    let mapInfo = null;

    const webcamImage = () => document.getElementById("webcamImage");
    const webcamEmpty = () => document.getElementById("webcamEmpty");

    function initWebcamEvents() {
      webcamImage().onload = () => {
        webcamEmpty().style.display = "none";
      };

      webcamImage().onerror = () => {
        webcamEmpty().style.display = "flex";
      };
    }

    function showLogin() {
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("dashboardScreen").classList.add("hidden");

      if (refreshTimer !== null) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function showDashboard() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboardScreen").classList.remove("hidden");
      refreshAll();
    }

    function goDashboard() {
      window.location.href = "/dashboard";
    }

    function goLogs() {
      window.location.href = "/logs";
    }

    async function loadMapInfo() {
      try {
        const res = await fetch("/api/map_info");
        const data = await res.json();

        if (res.ok) {
          mapInfo = data;
        } else {
          console.error("failed to load map info", data);
        }
      } catch (err) {
        console.error("map info load failed", err);
      }
    }

    async function checkSession() {
      try {
        const res = await fetch("/api/session");
        const data = await res.json();

        if (data.logged_in) {
          document.getElementById("usernameBox").textContent = `사용자 : ${data.username}`;
          await loadMapInfo();
          showDashboard();
        } else {
          showLogin();
        }
      } catch (e) {
        showLogin();
      }
    }

    async function login() {
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("loginError");

      errorBox.textContent = "";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: userId,
            password: password
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          errorBox.textContent = data.error || "로그인 실패";
          return;
        }

        document.getElementById("usernameBox").textContent = `사용자 : ${data.username}`;
        await loadMapInfo();
        showDashboard();
      } catch (e) {
        errorBox.textContent = "서버 연결 실패";
      }
    }

    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      showLogin();
    }

    // =========================================================
    // 비활성 버튼 동작
    // 화면에는 남겨두되 실제 요청은 보내지 않음
    // =========================================================
    function sendTeleop(direction) {
      console.log("[UI] teleop disabled:", direction);
    }

    function sendHome() {
      console.log("[UI] home disabled");
    }

    function sendStart() {
      console.log("[UI] start disabled");
    }

    async function stopAlert() {
      await fetch("/api/clear_alert", { method: "POST" });

      const sirenBox = document.getElementById("sirenBox");
      const sirenText = document.getElementById("sirenText");
      const alertText = document.getElementById("alertText");

      sirenBox.classList.remove("active");
      sirenBox.style.background = "";
      sirenBox.style.boxShadow = "";
      sirenText.textContent = "사이렌 OFF";
      alertText.textContent = "정상 상태";
    }

    function renderLogs(logs) {
      const logBox = document.getElementById("logBox");
      logBox.innerHTML = "";

      logs.forEach(log => {
        const div = document.createElement("div");
        div.textContent = `[${log.time}] [${log.robot}] ${log.message}`;
        logBox.appendChild(div);
      });
    }

    function getRenderedMapRect() {
      const mapCanvas = document.getElementById("mapCanvas");
      const containerWidth = mapCanvas.clientWidth;
      const containerHeight = mapCanvas.clientHeight;

      const imageAspect = mapInfo.width / mapInfo.height;
      const containerAspect = containerWidth / containerHeight;

      let drawWidth, drawHeight, offsetX, offsetY;

      if (imageAspect > containerAspect) {
        drawWidth = containerWidth;
        drawHeight = containerWidth / imageAspect;
        offsetX = 0;
        offsetY = (containerHeight - drawHeight) / 2;
      } else {
        drawHeight = containerHeight;
        drawWidth = containerHeight * imageAspect;
        offsetY = 0;
        offsetX = (containerWidth - drawWidth) / 2;
      }

      return {
        left: offsetX,
        top: offsetY,
        width: drawWidth,
        height: drawHeight
      };
    }

    function mapToDisplayPixel(x, y) {
      if (!mapInfo) return { x: 0, y: 0 };

      const rect = getRenderedMapRect();
      const rawX = (x - mapInfo.origin_x) / mapInfo.resolution;
      const rawY = mapInfo.height - ((y - mapInfo.origin_y) / mapInfo.resolution);

      return {
        x: rect.left + (rawX / mapInfo.width) * rect.width,
        y: rect.top + (rawY / mapInfo.height) * rect.height
      };
    }

    function renderMap(state) {
      if (!mapInfo) return;

      const mapCanvas = document.getElementById("mapCanvas");
      const mapOverlay = document.getElementById("mapOverlay");
      const mapPath = document.getElementById("mapPath");

      const displayWidth = mapCanvas.clientWidth;
      const displayHeight = mapCanvas.clientHeight;

      mapOverlay.innerHTML = "";
      mapPath.setAttribute("width", displayWidth);
      mapPath.setAttribute("height", displayHeight);
      mapPath.setAttribute("viewBox", `0 0 ${displayWidth} ${displayHeight}`);
      mapPath.innerHTML = "";

      const airPoints = state.air_path_points || [];
      const objectPoints = state.drop_points || [];

      if (airPoints.length >= 2) {
        const pointString = airPoints
          .slice(-150)
          .map(pt => {
            const p = mapToDisplayPixel(pt.x, pt.y);
            return `${p.x},${p.y}`;
          })
          .join(" ");

        const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        polyline.setAttribute("points", pointString);
        polyline.setAttribute("fill", "none");
        polyline.setAttribute("stroke", "rgba(239, 68, 68, 0.9)");
        polyline.setAttribute("stroke-width", "4");
        polyline.setAttribute("stroke-linecap", "round");
        polyline.setAttribute("stroke-linejoin", "round");
        mapPath.appendChild(polyline);
      }

      if (airPoints.length > 0) {
        const pt = airPoints[airPoints.length - 1];
        const p = mapToDisplayPixel(pt.x, pt.y);

        const dot = document.createElement("div");
        dot.className = "map-point air-point";
        dot.style.left = `${p.x}px`;
        dot.style.top = `${p.y}px`;
        mapOverlay.appendChild(dot);

        const label = document.createElement("div");
        label.className = "map-label";
        label.style.left = `${p.x}px`;
        label.style.top = `${p.y}px`;
        label.textContent = "Enemy";
        mapOverlay.appendChild(label);
      }

      objectPoints.slice(-100).forEach(pt => {
        const p = mapToDisplayPixel(pt.x, pt.y);

        const dot = document.createElement("div");
        dot.className = "map-point drop-point";
        dot.style.left = `${p.x}px`;
        dot.style.top = `${p.y}px`;
        mapOverlay.appendChild(dot);
      });
    }

    function renderAlert(alert) {
      const sirenBox = document.getElementById("sirenBox");
      const sirenText = document.getElementById("sirenText");
      const alertText = document.getElementById("alertText");

      if (alert && alert.active && alert.message) {
        sirenBox.classList.add("active");
        sirenBox.style.background = "red";
        sirenBox.style.boxShadow = "0 0 20px red, 0 0 40px red";
        sirenText.textContent = "사이렌 ON";
        alertText.textContent = alert.message;
      } else {
        sirenBox.classList.remove("active");
        sirenBox.style.background = "";
        sirenBox.style.boxShadow = "";
        sirenText.textContent = "사이렌 OFF";
        alertText.textContent = "정상 상태";
      }
    }

    function renderWebcam(state) {
      const bbox = document.getElementById("bbox");
      const bboxLabel = document.getElementById("bboxLabel");

      webcamImage().src = "/snapshot/webcam?t=" + Date.now();

      if (state.amr1.status === "Enemy Detected") {
        bbox.style.display = "block";
        bboxLabel.style.display = "block";
      } else {
        bbox.style.display = "none";
        bboxLabel.style.display = "none";
      }
    }

    function renderRobotStatus(state) {
      const box = document.getElementById("robotStatusBox");
      box.innerHTML = `
        <div>AMR_1 상태 : ${state.amr1.status}</div>
        <div>AMR_2 상태 : ${state.amr2.status}</div>
        <div>AMR_2 목표 : ${state.amr2.current_goal}</div>
      `;
    }

    function renderBattery(state) {
      document.getElementById("battery1").textContent = `AMR_1 ${state.amr1.battery}%`;
      document.getElementById("battery2").textContent = `AMR_2 ${state.amr2.battery}%`;
    }

    async function refreshState() {
      try {
        const response = await fetch("/api/state");
        if (!response.ok) {
          if (response.status === 401) showLogin();
          return;
        }

        const data = await response.json();
        latestState = data;

        renderBattery(data);
        renderRobotStatus(data);
        renderLogs(data.recent_logs || []);
        renderMap(data);
        renderAlert(data.alert);
        renderWebcam(data);
      } catch (err) {
        console.error("state refresh failed", err);
      }
    }

    function refreshAll() {
      refreshState();

      if (refreshTimer !== null) {
        clearInterval(refreshTimer);
      }

      refreshTimer = setInterval(refreshState, 300);
    }

    initWebcamEvents();

    loadMapInfo().then(() => {
      checkSession();
    });

    // 방향키 수동조작도 비활성화
    document.addEventListener("keydown", (e) => {
      if (document.getElementById("dashboardScreen").classList.contains("hidden")) return;

      if (
        e.key === "ArrowUp" ||
        e.key === "ArrowDown" ||
        e.key === "ArrowLeft" ||
        e.key === "ArrowRight" ||
        e.key === " "
      ) {
        e.preventDefault();
        console.log("[UI] keyboard teleop disabled");
      }
    });
  </script>
</body>
</html>
